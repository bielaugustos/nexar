<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="description" content="Ioversoroot — Evolução Pessoal com IA" />
    <!-- Safari: desabilita cache agressivo em desenvolvimento -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- iOS Safari — crítico para funcionar como app instalado -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Ioversoroot" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- iOS ícones (Safari não usa manifest icons) -->
    <link rel="apple-touch-icon" href="/icons/icon.svg" />

    <!-- Ícone da aba do browser -->
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />

    <!-- Cor da barra de status iOS -->
    <meta name="theme-color" content="#111111" />

    <title>Ioversoroot</title>

    <!-- Fontes -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;800&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Service Worker PWA — offline support -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => {
              console.log('[Ioversoroot] SW registrado:', reg.scope)
              // Notifica quando há atualização disponível
              reg.addEventListener('updatefound', () => {
                const newSW = reg.installing
                newSW.addEventListener('statechange', () => {
                  if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
                    // Nova versão disponível — pode notificar o usuário
                    console.log('[Ioversoroot] Nova versão disponível')
                  }
                })
              })
            })
            .catch(err => console.warn('[Ioversoroot] SW falhou:', err))
        })
      }
    </script>
  </body>
</html>
